name: Publish NuGet packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: Package version to publish
        required: true
        default: 0.3.0

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore package projects
        run: dotnet restore src/Nuri.WPF/Nuri.WPF.csproj

      - name: Restore Duxel and DevTools package projects
        run: dotnet restore src/Nuri.DevTools/Nuri.DevTools.csproj

      - name: Pack Nuri
        run: dotnet pack src/Nuri/Nuri.csproj -c Release --no-restore -m:1 -p:Version=${{ inputs.version }} -o artifacts/packages

      - name: Pack Nuri.WPF
        run: dotnet pack src/Nuri.WPF/Nuri.WPF.csproj -c Release --no-restore -m:1 -p:Version=${{ inputs.version }} -o artifacts/packages

      - name: Pack Nuri.Duxel.Windows
        run: dotnet pack src/Nuri.Duxel/Nuri.Duxel.Windows/Nuri.Duxel.Windows.csproj -c Release --no-restore -m:1 -p:NuriToolsReleaseVersion=${{ inputs.version }} -o artifacts/packages

      - name: Pack Nuri.DevTools
        run: dotnet pack src/Nuri.DevTools/Nuri.DevTools.csproj -c Release --no-restore -m:1 -p:NuriToolsReleaseVersion=${{ inputs.version }} -o artifacts/packages

      - name: Sign in to NuGet.org with trusted publishing
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Publish Nuri
        run: dotnet nuget push artifacts/packages/Nuri.${{ inputs.version }}.nupkg --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Publish Nuri.WPF
        run: dotnet nuget push artifacts/packages/Nuri.WPF.${{ inputs.version }}.nupkg --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Publish Nuri.Duxel.Windows
        run: dotnet nuget push artifacts/packages/Nuri.Duxel.Windows.${{ inputs.version }}.nupkg --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Publish Nuri.DevTools
        run: dotnet nuget push artifacts/packages/Nuri.DevTools.${{ inputs.version }}.nupkg --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
